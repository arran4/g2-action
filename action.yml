name: 'Setup g2'
description: 'Download and install g2 (Gentoo Tools by arran4)'
author: 'arran4'

inputs:
  version:
    description: 'The version of g2 to install (e.g. "latest", "v0.0.18").'
    required: false
    default: 'latest'
  github-token:
    description: 'GitHub token to authenticate API requests to prevent rate limiting.'
    required: false
    default: ${{ github.token }}
  action:
    description: 'The action to run with g2.'
    required: false
    default: ''
  install:
    description: 'Whether to install g2.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run setup script
      if: ${{ inputs.install == 'true' }}
      run: $GITHUB_ACTION_PATH/setup.sh "${{ inputs.version }}" "${{ inputs.github-token }}"
      shell: bash
    - name: Run g2 action
      if: ${{ inputs.action != '' }}
      run: g2 ${{ inputs.action }}
      shell: bash
